name: CI Pipeline Example
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint Helm Chart
        run: helm lint charts/my-app
      - name: Build Image
        run: docker build -t myregistry.com/my-app:v1.0.0 .
      - name: Security Scan
        run: trivy image myregistry.com/my-app:v1.0.0
      - name: Push to Registry
        run: docker push myregistry.com/my-app:v1.0.0
