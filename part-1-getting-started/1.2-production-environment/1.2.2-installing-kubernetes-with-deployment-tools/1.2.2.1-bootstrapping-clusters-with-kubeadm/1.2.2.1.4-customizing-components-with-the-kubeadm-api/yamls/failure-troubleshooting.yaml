apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeadm-api-customization-failures
data:
  common_failures: |
    - symptom: "kubeadm config validation fails"
      check: "kubeadm config migrate --old-config <file>"
      fix: "Update API version/fields to supported schema"
    - symptom: "component fails after config change"
      check: "kubectl get pods -n kube-system"
      fix: "Revert invalid flags and reapply reviewed config"
    - symptom: "unexpected runtime behavior"
      check: "kubectl logs -n kube-system <component-pod>"
      fix: "Compare effective flags with intended config"
