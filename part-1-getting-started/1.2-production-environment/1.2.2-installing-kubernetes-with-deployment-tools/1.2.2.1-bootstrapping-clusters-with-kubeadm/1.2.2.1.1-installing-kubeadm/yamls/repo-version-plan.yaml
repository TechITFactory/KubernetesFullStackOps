apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeadm-install-plan
  namespace: kube-system
data:
  kubernetesMinorVersion: v1.35
  packageRepository: https://pkgs.k8s.io/core:/stable:/v1.35/deb/
  notes: |
    Pin the cluster to a single Kubernetes minor release during initial provisioning.
    Upgrade minor versions deliberately, not during first bootstrap.
