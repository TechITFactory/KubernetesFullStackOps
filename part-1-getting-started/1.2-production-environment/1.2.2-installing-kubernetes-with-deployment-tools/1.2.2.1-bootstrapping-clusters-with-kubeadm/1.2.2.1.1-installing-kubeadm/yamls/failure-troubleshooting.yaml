apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeadm-install-failure-troubleshooting
data:
  common_failures: |
    - symptom: "kubeadm package install fails"
      check: "apt-cache policy kubeadm"
      fix: "Correct repo keyring and version pin settings"
    - symptom: "version drift after reboot"
      check: "apt-mark showhold | grep -E 'kubelet|kubectl|kubeadm'"
      fix: "Apply apt hold on Kubernetes packages"
    - symptom: "kubelet not found or wrong version"
      check: "kubelet --version"
      fix: "Reinstall pinned package version from official repo"
