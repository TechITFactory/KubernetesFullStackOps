apiVersion: v1
kind: ConfigMap
metadata:
  name: dual-stack-failure-troubleshooting
data:
  common_failures: |
    - symptom: "services missing IPv6 address"
      check: "kubectl get svc -o wide"
      fix: "Set ipFamilyPolicy to PreferDualStack/RequireDualStack"
    - symptom: "pods get only IPv4"
      check: "kubectl get pods -o wide"
      fix: "Enable dual-stack mode in CNI plugin config"
    - symptom: "cluster init fails with CIDR errors"
      check: "kubeadm init logs"
      fix: "Use non-overlapping IPv4/IPv6 pod and service CIDRs"
