apiVersion: v1
kind: ConfigMap
metadata:
  name: turnkey-cloud-options
  namespace: kube-system
data:
  managed-control-plane: |
    Prefer managed Kubernetes when your team wants to reduce control-plane operations burden.
  evaluation-criteria: |
    Compare upgrade controls, node OS choices, networking model, ingress/load-balancer integration,
    observability defaults, IAM integration, backup/disaster recovery, and autoscaling behavior.
  examples: |
    Examples include EKS, GKE, AKS, and other hosted Kubernetes offerings.
