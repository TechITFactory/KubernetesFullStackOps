apiVersion: v1
kind: Namespace
metadata:
  name: minikube-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginx
  namespace: minikube-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-nginx
  template:
    metadata:
      labels:
        app: hello-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello-nginx
  namespace: minikube-lab
spec:
  selector:
    app: hello-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
