apiVersion: apps/v1
kind: Deployment
metadata:
  name: zone-aware-web
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zone-aware-web
  template:
    metadata:
      labels:
        app: zone-aware-web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels:
                    app: zone-aware-web
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: zone-aware-web
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
