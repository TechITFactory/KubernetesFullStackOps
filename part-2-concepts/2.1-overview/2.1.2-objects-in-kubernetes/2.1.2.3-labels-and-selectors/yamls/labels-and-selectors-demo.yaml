apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: default
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: overview-module
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-web
        app.kubernetes.io/part-of: overview-module
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: default
  labels:
    app.kubernetes.io/part-of: overview-module
spec:
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - port: 80
      targetPort: 80
