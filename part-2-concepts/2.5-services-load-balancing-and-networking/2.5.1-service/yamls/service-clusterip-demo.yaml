# Demo: ClusterIP Service + Deployment in an isolated namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: svc-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: svc-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: svc-demo
spec:
  type: ClusterIP
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: 80
