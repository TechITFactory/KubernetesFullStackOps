apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-demo
spec:
  # Every minute — easy to observe with: kubectl get jobs -w
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: job
              image: busybox:1.36
              command: ["sh", "-c", "date"]
