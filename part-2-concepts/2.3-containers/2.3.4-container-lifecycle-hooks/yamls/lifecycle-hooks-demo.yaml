apiVersion: v1
kind: Pod
metadata:
  name: lifecycle-hooks-demo
spec:
  terminationGracePeriodSeconds: 30
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      lifecycle:
        postStart:
          exec:
            command: ["sh", "-c", "echo postStart > /tmp/postStart-ran"]
        preStop:
          exec:
            command: ["sh", "-c", "echo preStop && sleep 5"]
