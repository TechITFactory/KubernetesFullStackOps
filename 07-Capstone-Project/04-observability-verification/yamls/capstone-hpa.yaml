apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: capstone-frontend-hpa
  namespace: capstone-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: capstone-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
