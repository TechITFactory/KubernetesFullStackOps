apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capstone-prod-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/argoproj/argocd-example-apps.git'
    path: helm-guestbook
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: capstone-prod
  syncPolicy:
    automated:
      prune: true
