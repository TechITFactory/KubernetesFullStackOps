apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Pod
    metadata:
      name: qos-guaranteed
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits: {cpu: "100m", memory: "128Mi"}
  - apiVersion: v1
    kind: Pod
    metadata:
      name: qos-besteffort
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
