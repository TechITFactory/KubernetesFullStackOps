apiVersion: v1
kind: Pod
metadata:
  name: downward-api-demo
  labels:
    app: downward-api-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "cat /etc/podinfo/labels && sleep 3600"]
      volumeMounts:
        - name: podinfo
          mountPath: /etc/podinfo
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
  volumes:
    - name: podinfo
      downwardAPI:
        items:
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
