apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-demo
spec:
  serviceName: statefulset-demo
  replicas: 2
  selector:
    matchLabels:
      app: statefulset-demo
  template:
    metadata:
      labels:
        app: statefulset-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
---
apiVersion: v1
kind: Service
metadata:
  name: statefulset-demo
spec:
  clusterIP: None
  selector:
    app: statefulset-demo
  ports:
    - port: 80
      name: web
